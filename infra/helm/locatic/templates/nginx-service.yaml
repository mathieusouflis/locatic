{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "locatic.fullname" . }}-nginx
  labels:
    {{- include "locatic.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: {{ .Values.nginx.serviceType }}
  selector:
    {{- include "locatic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
{{- end }}
