apiVersion: v1
kind: Service
metadata:
  name: {{ include "locatic.fullname" . }}-svc
  labels:
    {{- include "locatic.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "locatic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
